<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>StorePilot Access Hub</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="rgba(255,255,255,0.15)" stroke="white"/>
            <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">StorePilot</div>
          <div class="brand-sub" id="storeName">Connecting…</div>
        </div>
      </div>
      <button class="icon-btn" id="openOptions" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Secure connection status bar -->
    <div class="secure-bar" id="secureBar" hidden>
      <span class="secure-dot"></span>
      <span id="secureText">Connection secure</span>
      <span class="network-name" id="networkName"></span>
    </div>

    <!-- States -->
    <div id="loadingState" class="state loading-state">
      <div class="spinner"></div>
      <div class="loading-title">Securing your connection…</div>
      <div class="loading-sub">Verifying workspace access</div>
    </div>
    <div id="errorState" class="state error" hidden></div>
    <div id="notConnectedState" class="state" hidden>
      <p>Not connected yet.</p>
      <button class="btn primary" id="goToOptions">Open setup</button>
    </div>

    <!-- Main content -->
    <main id="content" hidden>
      <!-- Tabs -->
      <nav class="tabs">
        <button class="tab active" data-tab="links">Links</button>
        <button class="tab" data-tab="templates">Templates</button>
        <button class="tab" data-tab="support">Report Problem</button>
      </nav>

      <!-- Links tab -->
      <section id="tab-links" class="tab-panel">
        <div id="linksList"></div>
        <div id="linksEmpty" class="empty" hidden>No links available for this store yet.</div>
      </section>

      <!-- Templates tab -->
      <section id="tab-templates" class="tab-panel" hidden>
        <div id="templatesList"></div>
        <div id="templatesEmpty" class="empty" hidden>No reply templates yet.</div>
      </section>

      <!-- Support tab -->
      <section id="tab-support" class="tab-panel" hidden>
        <form id="supportForm">
          <label class="field">
            <span>Problem type</span>
            <select id="supportType" required>
              <option value="LOGIN_PROBLEM">Login problem</option>
              <option value="NEED_ACCESS">Need access</option>
              <option value="WRONG_STORE">Wrong store</option>
              <option value="WEBSITE_ISSUE">Website issue</option>
              <option value="SOCIAL_MEDIA_ISSUE">Social media issue</option>
              <option value="BROWSER_SAFETY">Browser safety</option>
              <option value="OTHER">Other</option>
            </select>
          </label>
          <label class="field">
            <span>Describe the problem</span>
            <textarea id="supportMessage" rows="4" required
              placeholder="What happened? Do NOT include any passwords."></textarea>
          </label>
          <button type="submit" class="btn primary" id="supportSubmit">Send support request</button>
          <div id="supportResult" class="support-result" hidden></div>
        </form>
      </section>
    </main>

    <!-- Safety reminder footer -->
    <footer class="footer">
      🔒 Never share passwords in chat or email. Use the approved password manager.
    </footer>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
